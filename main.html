<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monaco Tabbed Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #1e1e1e;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* ---- Tabs Bar ---- */
        .tabs-bar {
            display: flex;
            align-items: center;
            background: #252526;
            padding: 4px 8px 0 8px;
            border-bottom: 1px solid #3a3a3a;
            flex-shrink: 0;
            min-height: 36px;
            overflow-x: auto;
            scrollbar-width: thin;
            gap: 2px;
        }
        .tabs-bar::-webkit-scrollbar {
            height: 4px;
        }
        .tabs-bar::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        .tab {
            display: flex;
            align-items: center;
            padding: 6px 12px;
            background: #2d2d2d;
            color: #cccccc;
            border-radius: 6px 6px 0 0;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
            border: 1px solid transparent;
            border-bottom: none;
            position: relative;
        }
        .tab:hover {
            background: #3a3a3a;
        }
        /* Active tab – no blue underline, just a background highlight */
        .tab.active {
            background: #3a3a3a;
            color: #ffffff;
            border-color: #3a3a3a;
        }
        .tab .tab-name {
            outline: none;
            min-width: 30px;
            cursor: text;
        }
        .tab .tab-name:focus {
            background: rgba(255,255,255,0.05);
        }
        .tab .close-btn {
            margin-left: 8px;
            color: #888;
            font-size: 16px;
            line-height: 1;
            cursor: pointer;
            border-radius: 4px;
            padding: 0 4px;
            transition: background 0.2s, color 0.2s;
        }
        .tab .close-btn:hover {
            background: #e81123;
            color: #fff;
        }

        .add-tab {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background: #2d2d2d;
            color: #cccccc;
            border-radius: 4px;
            font-size: 20px;
            font-weight: 300;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            margin-left: 4px;
            border: none;
        }
        .add-tab:hover {
            background: #3a3a3a;
            color: #fff;
        }
        .add-tab:active {
            transform: scale(0.92);
        }

        /* ---- Gear icon (settings) ---- */
        .settings-btn {
            margin-left: auto;
            background: transparent;
            border: none;
            color: #888;
            font-size: 20px;
            cursor: pointer;
            padding: 0 8px;
            transition: color 0.2s, transform 0.2s;
            line-height: 1;
        }
        .settings-btn:hover {
            color: #fff;
            transform: rotate(60deg);
        }

        /* ---- Editor Container ---- */
        .editor-wrapper {
            flex: 1;
            position: relative;
            background: #1e1e1e;
        }
        .editor-pane {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .editor-pane.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ---- Status Bar (accent color) ---- */
        .status-bar {
            background: #007acc;
            color: white;
            padding: 4px 16px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
            border-top: 1px solid #3a3a3a;
            transition: background 0.3s;
        }
        .status-bar .left {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .status-bar .badge {
            background: rgba(255,255,255,0.2);
            padding: 0 10px;
            border-radius: 12px;
            font-size: 12px;
        }
        .status-bar .right {
            opacity: 0.8;
        }

        /* ---- Loading splash ---- */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1e1e1e;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cccccc;
            font-size: 18px;
            z-index: 9999;
            flex-direction: column;
            gap: 16px;
            transition: opacity 0.4s;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #333;
            border-top-color: #007acc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ---- Settings Modal ---- */
        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .settings-overlay.open {
            display: flex;
        }
        .settings-panel {
            background: #2d2d2d;
            color: #eee;
            padding: 24px 30px;
            border-radius: 12px;
            min-width: 320px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.8);
            border: 1px solid #444;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .settings-panel h3 {
            margin-bottom: 16px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        .settings-panel label {
            display: block;
            margin: 10px 0 4px;
            font-size: 13px;
            color: #aaa;
        }
        .settings-panel input[type="color"] {
            width: 100%;
            height: 36px;
            border: none;
            background: transparent;
            cursor: pointer;
        }
        .settings-panel input[type="range"] {
            width: 100%;
            margin: 6px 0 10px;
            accent-color: #007acc;
        }
        .settings-panel .row {
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .settings-panel .row label {
            margin: 0;
            flex: 1;
        }
        .settings-panel select {
            background: #1e1e1e;
            color: #eee;
            border: 1px solid #555;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            width: 100%;
        }
        .settings-panel .close-settings {
            margin-top: 18px;
            background: #007acc;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            float: right;
            transition: background 0.2s;
        }
        .settings-panel .close-settings:hover {
            background: #005f9e;
        }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <span>Loading Monaco Editor...</span>
    </div>

    <!-- Tabs Bar -->
    <div class="tabs-bar" id="tabsBar">
        <!-- Tabs will be inserted here -->
        <button class="add-tab" id="addTabBtn">+</button>
        <button class="settings-btn" id="settingsBtn" title="Settings">⚙</button>
    </div>

    <!-- Editor Panes -->
    <div class="editor-wrapper" id="editorWrapper">
        <!-- Panes will be inserted here -->
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
        <div class="left">
            <span>● Lua</span>
            <span class="badge" id="statusBadge">Monaco Tabbed</span>
        </div>
        <div class="right">
            <span id="cursorStatus">Ln 1, Col 1</span>
        </div>
    </div>

    <!-- Settings Overlay -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-panel">
            <h3>⚙ Editor Settings</h3>
            <label>Accent Color</label>
            <input type="color" id="accentColor" value="#007acc">

            <label>Color Depth (Brightness)</label>
            <input type="range" id="colorDepth" min="0" max="200" value="100">
            <div style="display:flex; justify-content:space-between; font-size:12px; color:#888;">
                <span>Darker</span>
                <span>Normal</span>
                <span>Brighter</span>
            </div>

            <label>Editor Theme</label>
            <select id="themeSelect">
                <option value="lua-dark">Dark</option>
                <option value="vs-light">Light</option>
                <option value="vs-dark">VS Dark</option>
            </select>

            <button class="close-settings" id="closeSettings">Apply & Close</button>
        </div>
    </div>

    <!-- Monaco Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>

    <script>
        // ---- Global state ----
        let tabs = [];
        let activeTabId = null;
        let tabCounter = 0;
        let monacoReady = false;
        let currentAccent = '#007acc';
        let currentDepth = 100;

        // Expose functions for CefSharp
        window.GetText = function() {
            const editor = getActiveEditor();
            return editor ? editor.getValue() : '';
        };
        window.SetText = function(text) {
            const editor = getActiveEditor();
            if (editor) editor.setValue(text);
        };

        // Helper to get active editor
        function getActiveEditor() {
            const tab = tabs.find(t => t.id === activeTabId);
            return tab ? tab.editor : null;
        }

        // ---- Apply accent color ----
        function applyAccent(hex, depth) {
            // Convert hex to HSL, adjust lightness by depth, then back to hex
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            // Simple brightness scaling (depth 0-200, 100 = normal)
            const factor = depth / 100;
            const newR = Math.min(255, Math.round(r * factor));
            const newG = Math.min(255, Math.round(g * factor));
            const newB = Math.min(255, Math.round(b * factor));
            const finalHex = `#${newR.toString(16).padStart(2,'0')}${newG.toString(16).padStart(2,'0')}${newB.toString(16).padStart(2,'0')}`;

            // Update status bar background
            document.getElementById('statusBar').style.background = finalHex;
            // Update active tab background (we'll use a subtle highlight)
            document.querySelectorAll('.tab.active').forEach(el => {
                el.style.background = finalHex + '44'; // semi-transparent
                el.style.borderColor = finalHex;
            });
            // Update any other accent elements (like buttons)
            document.querySelector('.close-settings').style.background = finalHex;
            // Store for future tabs
            currentAccent = hex;
            currentDepth = depth;
        }

        // ---- Create a new tab ----
        function createTab(name, content = '') {
            const id = ++tabCounter;
            const tabObj = { id, name, content, editor: null, pane: null };

            // Create tab button
            const tabEl = document.createElement('div');
            tabEl.className = 'tab';
            tabEl.dataset.tabId = id;
            tabEl.innerHTML = `
                <span class="tab-name" contenteditable="false">${name}</span>
                <span class="close-btn" title="Close tab">×</span>
            `;
            // Insert before the add button
            const addBtn = document.getElementById('addTabBtn');
            document.getElementById('tabsBar').insertBefore(tabEl, addBtn);

            // Close button
            tabEl.querySelector('.close-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                closeTab(id);
            });

            // Double-click to rename
            const nameSpan = tabEl.querySelector('.tab-name');
            nameSpan.addEventListener('dblclick', () => {
                nameSpan.contentEditable = 'true';
                nameSpan.focus();
                const range = document.createRange();
                range.selectNodeContents(nameSpan);
                const sel = window.getSelection();
                sel.removeAllRanges();
                sel.addRange(range);
            });
            nameSpan.addEventListener('blur', () => {
                nameSpan.contentEditable = 'false';
                const newName = nameSpan.textContent.trim() || 'Untitled';
                nameSpan.textContent = newName;
                tabObj.name = newName;
                updateStatusBar();
            });
            nameSpan.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    nameSpan.blur();
                }
            });

            // Click to activate
            tabEl.addEventListener('click', () => activateTab(id));

            // Create editor pane
            const pane = document.createElement('div');
            pane.className = 'editor-pane';
            pane.id = `pane-${id}`;
            document.getElementById('editorWrapper').appendChild(pane);

            tabObj.pane = pane;

            if (monacoReady) {
                createEditorForTab(tabObj, content);
            } else {
                tabObj.pendingContent = content;
            }

            tabs.push(tabObj);
            activateTab(id);
            updateStatusBar();
            return tabObj;
        }

        // ---- Create Monaco editor for a tab ----
        function createEditorForTab(tabObj, content) {
            const pane = tabObj.pane;
            const theme = document.getElementById('themeSelect').value || 'lua-dark';
            const editor = monaco.editor.create(pane, {
                value: content || '',
                language: 'lua',
                theme: theme,
                automaticLayout: true,
                fontSize: 14,
                fontFamily: 'Cascadia Code, Consolas, monospace',
                minimap: { enabled: true },
                scrollBeyondLastLine: false,
                renderWhitespace: 'selection',
                tabSize: 4,
                insertSpaces: true,
            });
            tabObj.editor = editor;

            editor.onDidChangeCursorPosition((e) => {
                document.getElementById('cursorStatus').textContent =
                    `Ln ${e.position.lineNumber}, Col ${e.position.column}`;
            });
        }

        // ---- Activate a tab ----
        function activateTab(id) {
            if (activeTabId === id) return;
            if (activeTabId !== null) {
                const oldTab = tabs.find(t => t.id === activeTabId);
                if (oldTab) {
                    oldTab.pane.classList.remove('active');
                    const oldEl = document.querySelector(`.tab[data-tab-id="${activeTabId}"]`);
                    if (oldEl) oldEl.classList.remove('active');
                }
            }
            activeTabId = id;
            const newTab = tabs.find(t => t.id === id);
            if (newTab) {
                newTab.pane.classList.add('active');
                const newEl = document.querySelector(`.tab[data-tab-id="${id}"]`);
                if (newEl) newEl.classList.add('active');
                // Apply accent to active tab
                applyAccent(currentAccent, currentDepth);
                if (newTab.editor) newTab.editor.focus();
            }
            updateStatusBar();
        }

        // ---- Close a tab ----
        function closeTab(id) {
            if (tabs.length <= 1) {
                const tab = tabs.find(t => t.id === id);
                if (tab && tab.editor) {
                    tab.editor.setValue('');
                    tab.content = '';
                }
                return;
            }
            const tab = tabs.find(t => t.id === id);
            if (!tab) return;

            const tabEl = document.querySelector(`.tab[data-tab-id="${id}"]`);
            if (tabEl) tabEl.remove();
            if (tab.pane) tab.pane.remove();
            if (tab.editor) tab.editor.dispose();

            tabs = tabs.filter(t => t.id !== id);

            if (activeTabId === id) {
                const newActive = tabs.length > 0 ? tabs[0].id : null;
                if (newActive !== null) activateTab(newActive);
                else activeTabId = null;
            }
            updateStatusBar();
        }

        // ---- Update status bar ----
        function updateStatusBar() {
            const activeTab = tabs.find(t => t.id === activeTabId);
            if (activeTab) {
                document.getElementById('statusBadge').textContent = activeTab.name || 'Untitled';
            }
        }

        // ---- Apply theme to all editors ----
        function applyThemeToAll(theme) {
            tabs.forEach(tab => {
                if (tab.editor) {
                    monaco.editor.setTheme(theme);
                }
            });
        }

        // ---- Initialize Monaco and tabs ----
        (function init() {
            require.config({
                paths: {
                    'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs'
                }
            });

            require(['vs/editor/editor.main'], function() {
                // Define theme
                monaco.editor.defineTheme('lua-dark', {
                    base: 'vs-dark',
                    inherit: true,
                    rules: [
                        { token: 'comment', foreground: '6A9955', fontStyle: 'italic' },
                        { token: 'keyword', foreground: 'C586C0' },
                        { token: 'number', foreground: 'B5CEA8' },
                        { token: 'string', foreground: 'CE9178' },
                        { token: 'variable', foreground: '9CDCFE' },
                        { token: 'identifier', foreground: 'D4D4D4' },
                    ],
                    colors: {
                        'editor.background': '#1e1e1e',
                        'editor.lineHighlightBackground': '#2a2a2a',
                    }
                });

                monacoReady = true;

                const defaultContent = [
                    '-- Welcome to the Lua Editor!',
                    '-- You can rename this tab by double-clicking the name.',
                    '',
                    'local function greet(name)',
                    '    print("Hello, " .. name .. "!")',
                    'end',
                    '',
                    'greet("World")'
                ].join('\n');

                const tab1 = createTab('Script 1', defaultContent);
                createTab('Script 2', '-- Your second script');
                activateTab(tab1.id);
                document.getElementById('loading').classList.add('hidden');

                // Apply initial accent
                applyAccent('#007acc', 100);
            });
        })();

        // ---- Add new tab ----
        document.getElementById('addTabBtn').addEventListener('click', () => {
            createTab(`Script ${tabs.length + 1}`, '-- New script');
        });

        // ---- Settings button ----
        document.getElementById('settingsBtn').addEventListener('click', () => {
            document.getElementById('settingsOverlay').classList.add('open');
            // Populate current settings
            document.getElementById('accentColor').value = currentAccent;
            document.getElementById('colorDepth').value = currentDepth;
            document.getElementById('themeSelect').value = monaco.editor.getTheme() || 'lua-dark';
        });

        // ---- Close settings ----
        document.getElementById('closeSettings').addEventListener('click', () => {
            const overlay = document.getElementById('settingsOverlay');
            overlay.classList.remove('open');

            // Apply settings
            const newAccent = document.getElementById('accentColor').value;
            const newDepth = parseInt(document.getElementById('colorDepth').value);
            const newTheme = document.getElementById('themeSelect').value;

            currentAccent = newAccent;
            currentDepth = newDepth;
            applyAccent(newAccent, newDepth);
            applyThemeToAll(newTheme);
        });

        // Close settings by clicking on overlay background
        document.getElementById('settingsOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                document.getElementById('settingsOverlay').classList.remove('open');
            }
        });

        // ---- Resize all editors ----
        window.addEventListener('resize', () => {
            tabs.forEach(tab => {
                if (tab.editor) tab.editor.layout();
            });
        });

        // ---- Keyboard shortcut: Ctrl+N ----
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                document.getElementById('addTabBtn').click();
            }
        });
    </script>
</body>
</html>
